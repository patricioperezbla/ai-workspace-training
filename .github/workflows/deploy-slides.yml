name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build slides
        run: npx slidev build --base /ai-workspace-training/

      # Vite does not rewrite absolute /demos/ paths in JS bundles.
      # This patches the built output so GIF srcs resolve correctly under the subpath.
      - name: Fix public asset paths for GitHub Pages subpath
        run: |
          find dist -name "*.js" \
            -exec sed -i 's|"/demos/|"/ai-workspace-training/demos/|g' {} +
          find dist -name "*.html" \
            -exec sed -i 's|"/demos/|"/ai-workspace-training/demos/|g' {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
